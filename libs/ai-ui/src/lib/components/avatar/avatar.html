@if (fallback() && (!image() || !imageLoaded())) {
    <span class="absolute z-0 m-auto text-sm font-semibold font-title">{{ fallback() }}</span>
}

@if (image() && !imageError()) {
    <img fill
        sizes="100%"
        [alt]="alt()"
        [class]="imgClasses()"
        [ngSrc]="image()"
        [priority]="priority()"
        (error)="onImageError()"
        (load)="onImageLoad()" />
}

@if (status()) {
    @switch (status()) {
        @case ('online') {
            <svg
                xmlns="http://www.w3.org/2000/svg"
                width="24"
                height="24"
                viewBox="0 0 24 24"
                fill="currentColor"
                stroke="white"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                class="absolute -right-1.25 -bottom-1.25 z-20 h-5 w-5 text-green-500">
                <circle cx="12" cy="12" r="10" fill="currentColor" />
            </svg>
        }
        @case ('invisible') {
            <svg
                xmlns="http://www.w3.org/2000/svg"
                width="24"
                height="24"
                viewBox="0 0 24 24"
                fill="currentColor"
                stroke="white"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                class="absolute -right-1.25 -bottom-1.25 z-20 h-5 w-5 text-gray-500">
                <circle cx="12" cy="12" r="10" fill="currentColor" />
            </svg>
        }
        @case ('doNotDisturb') {
            <svg
                xmlns="http://www.w3.org/2000/svg"
                width="24"
                height="24"
                viewBox="0 0 24 24"
                fill="currentColor"
                stroke="white"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                class="absolute -right-1.25 -bottom-1.25 z-20 h-5 w-5 text-red-600">
                <circle cx="12" cy="12" r="10" />
                <path d="M8 12h8" fill="currentColor" />
            </svg>
        }
        @case ('away') {
            <svg
                xmlns="http://www.w3.org/2000/svg"
                width="24"
                height="24"
                viewBox="0 0 24 24"
                fill="currentColor"
                stroke="white"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                class="absolute -right-1.25 -bottom-1.25 z-20 h-5 w-5 rotate-y-180 text-yellow-400">
                <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z" fill="currentColor" />
            </svg>
        }
    }
}
