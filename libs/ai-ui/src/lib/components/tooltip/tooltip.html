<ng-container *stringTemplateRef="tooltipLabel()" aiId="tooltip" #ai="aiId">
    {{ tooltipLabel() }}
</ng-container>

<span [class]="arrowClasses()">
    <svg
        class="bg-foreground fill-foreground z-50 block size-2.5 translate-y-[calc(-50%-2px)] rotate-45 rounded-xs"
        width="10"
        height="5"
        viewBox="0 0 30 10"
        preserveAspectRatio="none">
        <polygon points="0,0 30,0 15,10" />
    </svg>
</span>
