<div class="flex flex-col items-start w-full">
    <div class="flex flex-col gap-1 w-full">
        <div class="flex items-center gap-x-2 h-5 relative">
            @let nameIcon = icon();
            @if (nameIcon) {
                <ai-icon [icon]="nameIcon" size="sm" />
            }
            <h5 class="font-semibold leading-6 h-6 font-title text-sm tracking-tight">{{ title() }}</h5>
        </div>
        @if (description()) {
            <span class="text-xs font-text font-medium">{{ description() }}</span>
        }
    </div>
    <div class="w-full">
        <ng-content />
    </div>
</div>
