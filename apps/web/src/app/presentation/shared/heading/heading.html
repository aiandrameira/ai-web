<header class="flex flex-col gap-8 sm:gap-10" [scrollingItem]="id() || 'overview'" [id]="id() || 'overview'">
    <div class="flex flex-col gap-6 sm:gap-8">
        <h1 class="text-4xl font-semibold text-primary font-title scroll-m-20 tracking-tight sm:text-3xl xl:text-4xl">
            {{ title() }}
        </h1>

        <p class="text-base font-text text-justify font-semibold text-muted-foreground leading-relaxed">
            {{ description() }}
        </p>
    </div>
</header>
