<div class="z-60 fixed top-0 flex items-center bg-background/95 backdrop-blur supports-backdrop-filter:bg-background/60 w-full">
    <div class="relative flex justify-between h-14 mx-auto w-full lg:max-w-(--breakpoint-2xl) px-4 sm:px-12">
        <div class="flex items-center gap-x-2">
            <a routerLink="/" class="cursor-pointer">
                <img [src]="theme() === 'dark' ? './img/logo-dark.svg' : './img/logo.svg'" alt="logo" width="28" />
            </a>

            <div class="hidden md:flex items-center gap-x-2 ml-4">
                @for (item of items; track item.name) {
                    <ai-button variant="ghost" size="sm" shape="circle" [routerLink]="item.path">
                        {{ item.name }}
                        @if (!item.available) {
                            <ai-badge class="py-0 px-1">soon</ai-badge>
                        }
                    </ai-button>
                }
            </div>
        </div>

        <div class="flex ml-auto items-center gap-x-2.5">
            <div class="hidden lg:flex items-center gap-x-2.5">
                <ai-input-search />
                <ai-separator orientation="vertical" class="h-4 bg-border" />
            </div>

            <ai-button [icon]="theme() === 'dark' ? 'sun' : 'moon'" (click)="change()" size="xs" variant="ghost" />

            <ai-separator orientation="vertical" class="h-4 bg-border" />

            <a ai-button icon="github" size="xs" variant="ghost" href="https://github.com/aiandrameira/ai-web" target="_blank" aria-label=""></a>

            <ai-separator orientation="vertical" class="h-4 bg-border block lg:hidden" />

            <ai-button variant="ghost" 
                size="sm" 
                shape="circle" 
                class="flex lg:hidden"
                [icon]="openMenu() ? 'close' : 'menu'"
                (click)="toggleMenu()" />
        </div>
    </div>
</div>
