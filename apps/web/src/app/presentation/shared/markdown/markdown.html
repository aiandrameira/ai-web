<div class="markdown-content">
    @let description = error();
    @if (loading()) {
        <div class="flex items-center justify-center p-8">
            <ai-loader size="sm" type="spinner" />
            <span class="ml-2 text-gray-600">Loading...</span>
        </div>
    } 
    @else if (description) {
        <ai-empty icon="error-warning" title="404 Not Found" class="w-full p-4 md:p-4 gap-y-4" [description]="description" />
    } @else {
        <main class="relative">
            <div id="markdown-body" [innerHTML]="processedHtml()"></div>
        </main>
    }
</div>
